{% extends 'base.html' %}
{% block title %}Connexion - CROU A2{% endblock %}
{% block content %}
<div class="max-w-md mx-auto px-4 py-8">
    <div class="bg-white rounded-xl shadow-md border p-6">
        <h2 class="text-2xl font-bold text-center mb-6">Connexion</h2>
        <form method="post" action="{% url 'connexion' %}">{% csrf_token %}
            <div class="mb-4">
                <input type="text" name="username" placeholder="Nom d'utilisateur (email ou n° carte étudiant)" class="w-full border rounded-lg p-2" required>
            </div>
            <div class="mb-4">
                <input type="password" name="password" placeholder="Mot de passe" class="w-full border rounded-lg p-2" required>
            </div>
            <button type="submit" class="w-full bg-orange-500 text-white py-2 rounded-lg font-semibold">Se connecter</button>
        </form>
        <p class="text-center text-sm text-gray-500 mt-4">
            Pas encore inscrit ? <a href="{% url 'inscription' %}" class="text-orange-500">Créer un compte</a>
        </p>
    </div>
</div>
{% endblock %}
